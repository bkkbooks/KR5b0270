  text: 太上淨明院補奏職局太玄都省須知髮七
  hash: sha256:355a4de0d95a0cbeb033787e06ffb0b68d231775e36ae4b8c71e81ad1c6f2d80
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0270_HFL_000-001a, image: hfl/0317/0317-124.png}
body:
  text: 髙明大使神功妙濟眞君許旌陽釋太玄都省者乃玉皇上帝專達之府府有文林武林二品官文林掌文章簿書禮儀之事武林掌誅邪殺伐之事並以行道法人依功績叙遷生曰遥勲死爲正授此常格也如生有竒能異績名係玄譜真聖叙用者常以正授或以福履叙用者魂神寄階夢判天法其有宿在鬼神科籍隂掌天憲聞聰見明心與天齊神與隂㑹者正授委任各有品第歳有稽考一歳則入於洞神文堂一文林知太玄都省使太玄都省節察使太玄副統使太玄使知太玄都省事太玄都省令太玄都省判令巳上七階以上元一品仙官充受都統大主使太玄都録太玄總計太玄史令太玄左右典史令同㑹太玄都史同僉太玄左右史太玄典左史太玄節檢太玄典司主計太玄典司佐計已上十階以中元一品仙官充受省使節令太玄都主吏太玄司主吏太玄直吏太玄判吏太玄典司吏太玄典吏佐太玄典司佐吏太玄都典佐太玄典司通吏同僉太玄典吏太玄稽斡太玄都省謄籍太玄左右司典計最太玄都太判官太玄左右判官已上十五階以下元一品仙官充受都録十司節使僉書太玄都省事同僉書太玄都省事已上二階謂新入局一武林太玄都省大總監太玄都省少總監太玄都省監副太玄都省上勾功太玄都省節制局長太玄都省大察姦騎吏太玄都省少察姦騎吏太玄都省中勾功太玄都省下勾功巳上十階以上元一品仙官充太玄都省上監功太玄都省下監功太玄都省上直太玄都省下直太玄都省大靈官太玄都省靈官衛郎太玄都省靈官佐郎太玄都省管轄中郎太玄省管衞中郎太玄省羽林司衞中郎巳上十階以中元一品仙官充太玄省都幹太玄省幹局太玄省指使太玄省總文太玄省總使太玄省祗應太玄省門下指使太玄宣毅衞郎太玄賛宣丞事太玄宣毅衞佐太玄賛宣丞佐太玄都虞候巳上十二階以下元一品仙官充右武林並隷都録差使文林自主吏而下每司一員差使武林自上監功而下每司一員太玄司局太玄都録玉清宫内掌管天下奏事通呈奏牘諸仙出身文籍兼都刑掌犯死刑籍事禄筭院掌人物生死事延生院掌人壽筭事治職院掌天下法官考第事天道院掌天下修行人事陽德院掌天下德事隂禍院掌天下惡事仙鬼院掌鬼神昇遷事天兵院掌三界兵馬事粮料院掌人物受用事罰壽院掌人枉死事黒獄院掌法官罪犯事仙籍院掌諸總籍事通呈院掌天下奏名事磨勘院掌四天磨勘司事宫廟院掌天下祭祀事天雷院掌天符事天雨院掌天下雨澤事散仙院掌諸法子出身事兵局院掌兵符死亡事檢察院掌上界神仙功過事天仙院掌諸天奏牘事諸法院掌十洲三島事招文院掌上降到法律事刑制院掌犯死罪刑籍事延祚院掌國祚君王名姓事陽官院掌陽界人世官事隂官院掌隂界地府官事義成院掌録天下行孝事清節院掌録清節事照臨院掌五星諸文事都刑院掌陽間刑獄事司命院掌人物註生事天樞院都省官格須知一文職此職以行道術奏牘行法有功人𠑽真公真伯真人真官真佐仙伯仙官仙佐巳上謂之上六職各有祕字金鑾殿五神殿定光殿太微殿紫微殿巳上謂之三等帶勲有曰學士有曰釋文有曰謄籍又有祕字使如曰仁毅之類乾靈閣坤成閣天使閣㑹文閣中和堂巳上謂之三等閣職有曰學士有曰謄籍有曰釋文明節堂明樂園㑹仙園瑶池巳上謂之三等聖符有曰差使有曰指揮從此止謂之破格並係天符特賜又有格外如三清左右承㫖使大使玄都宫太微宫紫微宫諸壇等尚書學士釋文謄籍判官之類此係上天出誥三都御史玄都清都神都三十二天上相五部尚書三十二天判官行壇五部判官行壇諸司録事如七十四司小判官諸院判官如驅邪院判官諸司僉書如同管右判官押司一百二十階如考照押司巳上謂之入調以年勞有功遷轉並係都司注擬奏名取㫖出誥一武職此職捉殺有功如伐壇破廟之類及生爲人名將𠑽或係文職於文字有過人降入將軍統軍領軍使者將巳上謂之上品五職各有祕字如六階六職五童君五童十方部署轉牒使巳上謂之四等親兵又有祕字使如日控鶴使之類直劒直印直符直節直旌已上謂之五等帶宣皆上有九天字如文階聖符從此止謂之破格並係天符特賜又有格外如三清大力君大力天丁之類係上天出誥四聖指使三天指使如玉童男巳下指使四聖總文三天總文四聖總領三天門下祗候三天門下指使五嶽宣毅城隍賛宣五嶽虞候城隍管界使散員一百二十階太清考照院散員巳上謂之軍將以年勞有功遷轉並係都司注擬奏名取㫖出帖右在前天職文武等在生有功轉職遥授死後正差供職三等攷功生死各依次補入天樞都司諸科律格入官格孝悌忠節精修行持隂功陽德有大勲勞在天地人三界者隨出身入文武資格次等昇有見在遥授有死後超注祕字格一文職共三品四字三字二字一武職共三品六字四字三字巳上各以字少爲上等多爲下等祕字驗出忠勇才謀孝宣慈惠廉正等平節威義文應妙德武華幽皓素明白清㓗肅恭温靖保康交㑹輝照赫隆寂靈秀爽巳上四十四字謂之正功外有破格褒稱萬萬餘字係天上祕字書死後超度免入獄格一孝行有稱一奉道有常一秉心直諒一隂功無敵一陽德彰明一好生惡殺一慈勇温慎死後入獄沉滯格欺隱負匿惡行潜宻晦幽罔知人神莫見十惡五逆紫庭真律格清淨不汚之謂㓗戒愼憂懼之謂勤欲而未得之謂真欲貪而未得之謂真貪取非取盜非盜淫非淫逆非逆順非順順逆逆順善惡惡善悔悟學道謂之上善矯情非道謂之大惡生非其生殺非其殺掩善爲蔽隱惡爲欺殺而欲之生者謂之好生見而欲之死者謂之好殺怨父母者不可以生雖生之亦可以殺故真孝者不死至孝者得仙仙道易鬼道難善人之常惡人之僞善本善習使之惡惡非惡攺斯爲善鬼格祕収受上賞泄慢蒙顯戮以僞勸善曰信以誠文過曰非隂禍大陽禍小發於心而不露者罪巳彰爲於外而有愧者罪可恕無抑人抑人者必不可以從道雖奪人奪人者尚可以行道天樞都司局天樞都録係在世活人管提舉僉書録事七人有曹掾七人承受發放七録事司公事管元㑹管兵一萬人召天攝軍第一録事司相提真人沈佺第二録事司茂全真人汪洋第三録事司陽明仙佐傅受第四録事司明救治續真人封休第五録事司守分未有仙職胡注第六録事司守分未有仙職孔文第七録事司守分未有仙職方整七録事掌僉書七十四公事外録筭司係節員附第一録司通七十四司僉録七録事亦係在世活人名屬都司隱祕不傳第一録事司名㑹府連録筭司節員二十七司録筭司掌人物主生死都數宜樞關鍵真人蔡援延生案掌增崇壽筭玄絳丹霞真人王自紀功院掌天下人功德輝騰真人盧藏用職事司掌天下法官放第休應真人賈益天道院掌天下修行人籍妙德真人呉忱隂績寺掌天下隂德隂禍無爲治道真人朱黻鬼仙案掌鬼中昇仙籍紏察崇靈真人蕭史兵馬司掌三界兵馬數日休上元真人歐陽立粮料司掌人物受用數靈輝子華真人歐陽度司命案掌人物注而未生符命保功眞人傳元枉死案掌人物枉死罰壽罰筭龍光真人白敏中黒獄簿掌仙官罪犯風樂莊重真人匡休崇真院詳定紀功院事黄官真人廖立仙籍院掌諸仙總籍丹霞真人吳權詳定司掌謄録天下奏牘西華真人吳釆奏事局掌通呈奏牘北洞真人王喬年都刑院掌人間刑獄明分真人臯陶天樞院掌隂獄諸處天地獄申呈幽闢真人葛磨勘司掌四天磨勘事八開真人姜惟宫廟籍掌祭祀入典鬼神衮常真人趙奉侯雷雨案掌雷雨仙官節府朗野真人蕭莊散仙案掌諸仙出身文籍寳靜真人蹇常檢察院掌法駕天文及仙女治具最仙真人傅興差兵案掌三界兵符死亡勝敗靈德真人郭茂先檢察司掌上界判官功過清景真人劉真諸天奏院掌諸天仙官奏牘文崇治至真人甄善濟諸天奏案掌三島十洲奏牘妙應無上真人蔡符第二録事司名左八司都局檢察右司掌中下界判官籍杜庭真人江真檢察左司掌五嶽奏牘文字陽華真人梁竦招文院掌上天降到法律等妙真人裴言刑制院掌犯罪死刑籍華陽真人馮垣延祚司掌國祚君王名姓素廣真人崔紀陽官院掌陽界人世官僚清讜真人殷覺隂官院掌隂界地府官僚赫曦真人伍竒祗候典掌酆都罪死文字瑶康真人黄恍第三録事名右六司都局義成院掌録天下忠孝廣明真人仇覧清節院掌録清節之士符㑹真人黄定照臨寺掌四夷人物同僚真人歐陽免廣照寺掌四夷運祚保康真人廖忻日月司掌日月奏牘恭和真人仇香五星院掌諸星文交光真人士曜第四第五第六第七録事掌四方二十八宿行到事名八同承受七司是正案一司是節員共封爲真人號東方第四録事判官八人共封清輝真人羊其王吉奉朗汪覺張亮侯甫牛慶牛度南方第五録事判官八人共封赫華真人竇建萬勝封言茂中封真華簡至相西方第六録事判官八人共封素寂真人黄文蕭宗關子明胡干胡注黄萬勝劉知㡬劉璋北方第七録事判官八人共封幽靈真人盧吉光郭援王治道李允中李蕡曹洪胡江胡真天樞轉牒使掌轉送文字付諸司屬都司總管左控鶴使崔隆曹司右馭龍使胡德節貟右赤童竇升洞神職制律格洞神堂謂之三堂在中山玄關三便門之東道君靈寳天尊受元始天尊之法旣成上道於此闢堂爲太上老君說法於諸選之清竒者實知之有得其位者須曽爲太上發大誓願救度群生如是成道之後方及已身有大善惠在於人世應上帝之心者名定官定官言其官卑而名重至此者不再有升黜也一洞神文郎九品洞神真卿大學士等洞神真文小學士等洞神真翁刪定官修撰官等右上三品自真翁而上凡俗不可多得雖六位真師稱洞神真卿洞神仙卿編修官檢討官等洞神仙僚箋翰節録抄註校正節檢詳對巳上定官洞神叅議三都御史五部尚書諸天三景典音等右中三品諸叅議等入洞神格局須帶洞神叅議字洞神叅佐巳上自紫微以下司局官入此局洞神典事洞神亞卿巳上自叅議以下爲崇僚帶出下三品也右下三品一洞神武郎九品洞神總副洞神侍衞洞神侍郎右上三品洞神丞衞洞神節衞洞神宣衞右中三品洞神上衞洞神中衞洞神下衞右下三品一行遣奏格如表奏行移並如常式凡奏狀前封面以黄紙帖事仍於狀前批申發日時應奏請事於年月日旁貼乞降付某處后借即者亦於此開說差出者仍貼云臣今見在某處某月日發向某處巳上用表奏者亦各准此封面具臣姓名狀奏謹實封即謹實封即摺角也兩端用印無印者具名書字封面不貼黄在外奏者止貼係機宻或急速字其用劄字者前不具位不用名不用年攺狀爲劄字事末云取進止即直詣通落不經司屬急速文字其用榜子唯不用年不全幅不封如狀小書於黙奏時則面北行事爐前焚化保奏如保奏官將傳法用具官姓名臣准令或格略具合舉條例右臣某伏覩某官姓名入意㫖今保舉堪充行云云如後異同例依天憲謹具録奏聞伏候勑㫖如保人於他處即稱仙㫖年月日狀奏單狀某司自申狀則具位某事若無事因者於此使云右云謹具申如前列數事云云髮七十三右件狀如前云云某司謹狀若取處分即云伏候指揮年月日具位狀凡有所統攝者皆用此式如申東嶽之類仍於狀前貼出申發日時某司牒某司某官某事云云牒件如前列數事云云謹牒太歳年月日牒具官書押凡不相統攝者行移用此式諸神牒准此攺某司作某人姓名不空字雖統攝而無申狀例及相等皆用上式於所轄而無符貼例者則曰牒某處或某官並不空字年月日具衘書押凡同所𨽻而别職局者用如天道院關仙籍案之類天樞也符式某司某事云云右符某處主者云云符到奉行年月日符具官書押凡所屬用此式如付社令之類帖式某司某事云云右帖某處某官云云如前列事則之右件帖云云年月日帖具位押凡差撥神將治病行事用此如用引曰引曉示某司某事云云右告下云云者别事則云右件云云年月日曉示具位押合用印奏上帝表狀用淨明院印上箋詞職印上天行移用太玄省印九地行移用淨明法主印祈穰超度用道君印救治差將書符攝召用總監鬼神印印式淨太玄明都省法之印主印總道監君鬼印印太上淨明院補奏職局太玄都省須知
